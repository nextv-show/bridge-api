# 三水元小程序后端反代片段
# 放入 api.sanshuiyuan.com 的 server { ... } 块内（与现有 /api/h5/ 同级），然后:
#   sudo nginx -t && sudo systemctl reload nginx
#
# user-service(8081)：小程序登录/资料  →  /api/user/*  去掉前缀转发到根路径
#   例: /api/user/me                  -> 127.0.0.1:8081/me
#       /api/user/auth/wx/miniprogram -> 127.0.0.1:8081/auth/wx/miniprogram
# asset-service(8082)：资产/钱包/充值/微信支付回调  →  /api/asset/*
#   例: /api/asset/wallet                  -> 127.0.0.1:8082/wallet
#       /api/asset/assets/mine             -> 127.0.0.1:8082/assets/mine
#       /api/asset/wxpay/wallet-callback   -> 127.0.0.1:8082/wxpay/wallet-callback  (微信支付回调)
#
# 注意：proxy_pass 末尾的 "/" 会把 location 前缀剥掉，故服务内仍是根路径路由。

location /api/user/ {
    proxy_pass         http://127.0.0.1:8081/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Authorization     $http_authorization;
}

location /api/asset/ {
    proxy_pass         http://127.0.0.1:8082/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Authorization     $http_authorization;
    # 微信支付回调体需原样透传（验签依赖原始 body）
    proxy_set_header   Content-Type      $http_content_type;
    client_max_body_size 1m;
}

# 小程序客户端对应 env（src/miniprogram，构建时注入）：
#   TARO_APP_USER_API=https://api.sanshuiyuan.com/api/user
#   TARO_APP_ASSET_API=https://api.sanshuiyuan.com/api/asset
# 微信公众平台「request 合法域名」需加入 https://api.sanshuiyuan.com
