server:
  port: 8088
spring:
  application:
    name: water-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/water_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: water_flyway_schema_history
springdoc:
  api-docs:
    path: /api-docs
h5:
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
  aes-master-key: ${H5_AES_MASTER_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
s2s:
  token: ${S2S_TOKEN:dev-s2s-shared-token}
iot-gateway:
  base-url: ${IOT_GATEWAY_BASE_URL:http://localhost:8089}
wxpay:
  mp-app-id: ${WXPAY_MP_APP_ID:stub}
  mch-id: ${WXPAY_MCH_ID:stub}
  api-v3-key: ${WXPAY_API_V3_KEY:stub}
  private-key-path: ${WXPAY_PRIVATE_KEY_PATH:}
  merchant-serial-number: ${WXPAY_MERCHANT_SERIAL_NUMBER:}
  notify-url: ${WXPAY_NOTIFY_URL:}
  public-key-path: ${WXPAY_PUBLIC_KEY_PATH:}
  public-key-id: ${WXPAY_PUBLIC_KEY_ID:}
wallet:
  min-topup-cents: ${WALLET_MIN_TOPUP_CENTS:500}
