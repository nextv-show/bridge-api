server:
  port: 8089
spring:
  application:
    name: iot-gateway-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: iot_flyway_schema_history
springdoc:
  api-docs:
    path: /api-docs
h5:
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
s2s:
  token: ${S2S_TOKEN:dev-s2s-shared-token}
# MQTT Broker 配置（EMQX）
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  username: ${MQTT_USERNAME:sanshuiyuan}
  password: ${MQTT_PASSWORD:sanshuiyuan123}
  client-id-prefix: iot-gw-
