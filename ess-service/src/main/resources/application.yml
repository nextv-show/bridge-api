server:
  port: 8085

spring:
  application:
    name: ess-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}
  datasource:
    url: jdbc:mysql://localhost:3306/ess_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    table: ess_flyway_schema_history

ess:
  secret-id: ${ESS_SECRET_ID:}
  secret-key: ${ESS_SECRET_KEY:}
  operator-id: ${ESS_OPERATOR_ID:}
  corp-id: ${ESS_CORP_ID:}
  template-id: ${ESS_TEMPLATE_ID:}
  callback-url: ${ESS_CALLBACK_URL:}
  api-region: ${ESS_API_REGION:ap-guangzhou}
  api-endpoint: ${ESS_API_ENDPOINT:ess.test.ess.tencent.cn}
  connect-timeout-ms: 5000
  read-timeout-ms: 10000
  max-retries: 3
  # 个人签署传 ApproverIdCardNumber，配合核身（小程序认购签约依赖此项）。
  collect-id-card: ${ESS_COLLECT_ID_CARD:true}
  # 个人签署方核身方式 ApproverSignTypes（逗号分隔）：1=人脸 2=密码 3=运营商三要素。
  # 小程序「短信短链」签署须避开人脸，默认 3（运营商三要素 + 签署时短信验证码意愿认证）。留空则用账号侧签署要求。
  approver-sign-types: ${ESS_APPROVER_SIGN_TYPES:3}
  # 文件模式发起（CreateFlowByFiles）：后端渲染「变量已填好」的合同 PDF，平台只放签名/签章控件。
  # 默认关闭 → 维持既有模板模式；开启前需在腾讯电子签测试账号侧确认印章/静默签配置。
  file:
    enabled: ${ESS_FILE_MODE_ENABLED:false}
    endpoint: ${ESS_FILE_ENDPOINT:file.test.ess.tencent.cn}
    signature-keyword: ${ESS_FILE_SIGN_KEYWORD:电子签字}
    date-keyword: ${ESS_FILE_DATE_KEYWORD:}
    company-seal: ${ESS_FILE_COMPANY_SEAL:false}
    seal-keyword: ${ESS_FILE_SEAL_KEYWORD:公章}
    company-name: ${ESS_FILE_COMPANY_NAME:天津源创智能科技有限公司}
    # 甲方签名控件定位（合同左栏较宽，Right 不溢出）
    relative-location: ${ESS_FILE_RELATIVE_LOCATION:Right}
    # 乙方签章控件独立定位：公章靠右边，Right 会溢出页面，默认盖在「公章」标签下方
    seal-relative-location: ${ESS_FILE_SEAL_RELATIVE_LOCATION:Below}
    seal-width: ${ESS_FILE_SEAL_WIDTH:100}
    seal-height: ${ESS_FILE_SEAL_HEIGHT:100}
    seal-offset-x: ${ESS_FILE_SEAL_OFFSET_X:0}
    seal-offset-y: ${ESS_FILE_SEAL_OFFSET_Y:5}

# 合同 PDF 渲染（文件模式）。中文合同必须有 CJK 字体，否则正文显示为方块。
contract:
  pdf:
    font-path: ${CONTRACT_PDF_FONT_PATH:}
    page-size: ${CONTRACT_PDF_PAGE_SIZE:A4}

# 小程序签署默认 appId（sign-params?clientType=MINI 时透传给 ESS CreateSchemeUrl；前端可用 wxAppId 覆盖）。
wx:
  miniprogram:
    app-id: ${WX_MP_APP_ID:}

# H5 会话 JWT：与 cend-service 同密钥（H5_JWT_SECRET），仅用于校验 /api/c/* 会话 token。
h5:
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
  jwt-ttl-hours: ${H5_JWT_TTL_HOURS:72}

# 服务间（S2S）token：保护 /api/admin/*（admin-service BFF 携带），并用于出站调 user-service。
# 与各服务共享同一 S2S_TOKEN 环境变量 / 默认值。
s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 出站调 user-service 内部接口（按 openid 解析 userId，合同 owner 校验）。
user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

springdoc:
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%c","msg":"%m","ex":"%ex"}%n'

oss:
  endpoint: ${OSS_ENDPOINT:http://localhost:9000}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:sanshuiyuan}
  contract-path-prefix: contracts/
