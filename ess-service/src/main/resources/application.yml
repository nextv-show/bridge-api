server:
  port: 8085

spring:
  application:
    name: ess-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}
  datasource:
    url: jdbc:mysql://localhost:3306/ess_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    table: ess_flyway_schema_history

ess:
  secret-id: ${ESS_SECRET_ID:}
  secret-key: ${ESS_SECRET_KEY:}
  operator-id: ${ESS_OPERATOR_ID:}
  corp-id: ${ESS_CORP_ID:}
  template-id: ${ESS_TEMPLATE_ID:}
  callback-url: ${ESS_CALLBACK_URL:}
  api-region: ${ESS_API_REGION:ap-guangzhou}
  api-endpoint: ${ESS_API_ENDPOINT:ess.test.ess.tencent.cn}
  connect-timeout-ms: 5000
  read-timeout-ms: 10000
  max-retries: 3
  # 个人签署传 ApproverIdCardNumber，触发腾讯电子签内的实名+人脸核身（小程序认购签约依赖此项）。
  collect-id-card: ${ESS_COLLECT_ID_CARD:true}

# 小程序签署默认 appId（sign-params?clientType=MINI 时透传给 ESS CreateSchemeUrl；前端可用 wxAppId 覆盖）。
wx:
  miniprogram:
    app-id: ${WX_MP_APP_ID:}

# H5 会话 JWT：与 cend-service 同密钥（H5_JWT_SECRET），仅用于校验 /api/c/* 会话 token。
h5:
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
  jwt-ttl-hours: ${H5_JWT_TTL_HOURS:72}

# 服务间（S2S）token：保护 /api/admin/*（admin-service BFF 携带），并用于出站调 user-service。
# 与各服务共享同一 S2S_TOKEN 环境变量 / 默认值。
s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 出站调 user-service 内部接口（按 openid 解析 userId，合同 owner 校验）。
user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

springdoc:
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%c","msg":"%m","ex":"%ex"}%n'

oss:
  endpoint: ${OSS_ENDPOINT:http://localhost:9000}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:sanshuiyuan}
  contract-path-prefix: contracts/
