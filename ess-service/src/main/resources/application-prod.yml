# ================================================================
# 生产环境 Profile
# 用法: java -jar app.jar --spring.profiles.active=prod
# ================================================================
ess:
  api-endpoint: ${ESS_API_ENDPOINT:ess.tencentcloudapi.com}
  collect-id-card: ${ESS_COLLECT_ID_CARD:true}
  connect-timeout-ms: 5000
  read-timeout-ms: 15000
  max-retries: 3

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:bridge-mysql}:3306/ess_db?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Asia/Shanghai
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    com.sanshuiyuan.ess: INFO
    # 生产环境不打印 API body，只打印元数据
    com.sanshuiyuan.ess.infra.client: WARN
