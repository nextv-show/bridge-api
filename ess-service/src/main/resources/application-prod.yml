# ================================================================
# 生产环境 Profile
# 用法: java -jar app.jar --spring.profiles.active=prod
# ================================================================
ess:
  api-endpoint: ${ESS_API_ENDPOINT:ess.tencentcloudapi.com}
  collect-id-card: ${ESS_COLLECT_ID_CARD:true}
  connect-timeout-ms: 5000
  read-timeout-ms: 15000
  max-retries: 3
  # 出证（存证报告）默认关闭：付费服务，确认弃用、不增加运营成本。
  certificate:
    enabled: ${ESS_CERTIFICATE_ENABLED:false}
  # 文件模式发起（CreateFlowByFiles）。默认仍关闭，确认腾讯电子签账号侧印章/静默签后再
  # 置 ESS_FILE_MODE_ENABLED=true 灰度开启。生产文件上传走正式域名 file.ess.tencent.cn。
  file:
    enabled: ${ESS_FILE_MODE_ENABLED:false}
    endpoint: ${ESS_FILE_ENDPOINT:file.ess.tencent.cn}
    signature-keyword: ${ESS_FILE_SIGN_KEYWORD:电子签字}
    date-keyword: ${ESS_FILE_DATE_KEYWORD:}
    company-seal: ${ESS_FILE_COMPANY_SEAL:false}
    seal-keyword: ${ESS_FILE_SEAL_KEYWORD:公章}
    company-name: ${ESS_FILE_COMPANY_NAME:天津源创智能科技有限公司}
    company-seal-id: ${ESS_FILE_COMPANY_SEAL_ID:}
    relative-location: ${ESS_FILE_RELATIVE_LOCATION:Right}
    seal-relative-location: ${ESS_FILE_SEAL_RELATIVE_LOCATION:Below}
    seal-width: ${ESS_FILE_SEAL_WIDTH:100}
    seal-height: ${ESS_FILE_SEAL_HEIGHT:100}
    seal-offset-x: ${ESS_FILE_SEAL_OFFSET_X:0}
    seal-offset-y: ${ESS_FILE_SEAL_OFFSET_Y:5}

# 合同 PDF 渲染（文件模式）。生产服务器须装【单文件 TrueType(.ttf)】CJK 字体。
# 渲染器无法加载 .ttc 字体集（如 fonts-noto-cjk），也无法嵌入 CFF/OTF（Noto .otf 会渲染抛 NPE）。
#   Anolis/CentOS:  dnf install google-droid-sans-fonts → /usr/share/fonts/google-droid/DroidSansFallback.ttf
#   Debian/Ubuntu:  apt install fonts-droid-fallback     → /usr/share/fonts/truetype/droid/DroidSansFallbackFull.ttf
# 详见 docs/technical/ess-file-mode-deployment.md。
contract:
  pdf:
    font-path: ${CONTRACT_PDF_FONT_PATH:/usr/share/fonts/truetype/droid/DroidSansFallbackFull.ttf}
    page-size: ${CONTRACT_PDF_PAGE_SIZE:A4}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:bridge-mysql}:3306/ess_db?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Asia/Shanghai
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    com.sanshuiyuan.ess: INFO
    # 生产环境不打印 API body，只打印元数据
    com.sanshuiyuan.ess.infra.client: WARN
