server:
  port: 8091
spring:
  application:
    name: settlement-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: settlement_flyway_schema_history
springdoc:
  api-docs:
    path: /api-docs
h5:
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
s2s:
  token: ${S2S_TOKEN:dev-s2s-shared-token}
water-service:
  base-url: ${WATER_SERVICE_BASE_URL:http://localhost:8088}
wxpay:
  mp-app-id: ${WXPAY_MP_APP_ID:stub}
  mch-id: ${WXPAY_MCH_ID:stub}
  api-v3-key: ${WXPAY_API_V3_KEY:stub}
  merchant-serial-number: ${WXPAY_MERCHANT_SERIAL_NUMBER:}
  private-key-path: ${WXPAY_PRIVATE_KEY_PATH:}
  notify-url: ${WXPAY_NOTIFY_URL:}
  # 公钥模式（商家转账复用 cend/water 同 MCH 凭证）
  public-key-path: ${WXPAY_PUBLIC_KEY_PATH:}
  public-key-id: ${WXPAY_PUBLIC_KEY_ID:}
  # 商家转账（佣金报酬 场景 1005）
  payout:
    transfer-scene-id: ${WXPAY_TRANSFER_SCENE_ID:1005}
    report-post-type: ${WXPAY_PAYOUT_POST_TYPE:水机运营服务商}
    report-remark: ${WXPAY_PAYOUT_REMARK:水机运营服务分成}
    notify-url: ${WXPAY_PAYOUT_NOTIFY_URL:}
settlement:
  outbox-entries-posted-enabled: ${SETTLEMENT_OUTBOX_ENTRIES_ENABLED:false}
