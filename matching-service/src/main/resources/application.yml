server:
  port: 8086   # plan §0.5 E-3（8083/8084/8085 已占）
spring:
  application:
    name: matching-service
  datasource:
    # E-2：连 h5_db（与 users / device_assets / h5_orders 同库，接单单事务改 stage 必需）。
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/h5_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: matching_flyway_schema_history   # 同库 h5_db，独立历史表（不与 h5/admin 冲突）

springdoc:
  api-docs:
    path: /api-docs

# E-1：复用 cend-service 的 H5 JWT 密钥（HS256）。生产务必与 cend-service 同值环境变量覆盖。
h5:
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
  # 手机号 AES-GCM 主密钥（Base64，32字节）。务必与 cend-service 同值，否则跨服务解密失败。
  aes-master-key: ${H5_AES_MASTER_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

# B.2.4 撮合发布限频（按手机号 + IP）。
rate-limit:
  matching:
    ip-per-minute: 60
    phone-per-minute: 1
    phone-per-day: 5

# Phase D: S2S shared token（与 logistics-service 共享，用于 /internal/** 端点）。
s2s:
  token: ${S2S_TOKEN:dev-s2s-shared-token}
