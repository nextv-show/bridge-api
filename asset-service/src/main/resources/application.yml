server:
  port: 8082

spring:
  application:
    name: asset-service
  datasource:
    url: jdbc:mysql://localhost:3306/asset_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

wxpay:
  merchant-id: ${WXPAY_MCH_ID:}
  api-key-path: ${WXPAY_API_KEY_PATH:}
  merchant-serial-number: ${WXPAY_MCH_SERIAL:}
  # api-v3-key intentionally NOT declared here: in dev/CI the WXPAY_API_V3_KEY env var is absent, so
  # the property is genuinely missing and SdkWxPayCallbackVerifier (@ConditionalOnProperty
  # wxpay.api-v3-key) is not created — the fail-closed UnconfiguredWxPayCallbackVerifier is used
  # instead. Setting WXPAY_API_V3_KEY in prod (relaxed-bound to wxpay.api-v3-key) activates real
  # verification.
  app-id: ${WXPAY_APP_ID:}
  notify-url: ${WXPAY_NOTIFY_URL:}
  # 小程序支付：payer appid 为小程序 appid（非公众号 app-id）；水费充值回调独立地址
  mp-app-id: ${WX_MP_APP_ID:}
  wallet-notify-url: ${WXPAY_WALLET_NOTIFY_URL:}
  # 微信支付公钥模式（新商户必须，与 h5-service 一致）；未配置则回退平台证书自动下载
  public-key-path: ${WXPAY_PUBLIC_KEY_PATH:}
  public-key-id: ${WXPAY_PUBLIC_KEY_ID:}
  # 购机退款异步回调地址（微信 V3 退款 notify_url）；未配置则退款单不带回调，全靠主动查单兜底
  refund-notify-url: ${WXPAY_REFUND_NOTIFY_URL:}

# 入站 S2S 期望令牌：校验其他服务（如 user-service）调用本服务 /internal/** 时携带的 X-S2S-Token。
# 与 user-service 顶层 s2s-token 共享同一 S2S_TOKEN 环境变量 / 默认值，prod 未设时两端仍对齐。
# 注意：本 key 是「入站期望」，与下方 user-service.s2s-token（出站调用 user-service 携带）用途相反。
s2s-token: ${S2S_TOKEN:local-dev-static-token}

user-service:
  base-url: http://localhost:8081
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 校验 user-service 签发的 access token（HS256）。secret 必须与 user-service 的 jwt.secret 完全一致，
# 默认值也保持字节级相同，prod 两端 JWT_SECRET 均未设时回退到同一默认，验签才能通过。
# ⚠️ 生产务必给 user-service 与 asset-service 设置同一个强 JWT_SECRET，勿沿用此公开默认值（否则可被伪造验签通过的有效 token）。
jwt:
  secret: ${JWT_SECRET:change-me-in-production-at-least-256-bits-long!!}

# 推荐返利（一次性实物销售介绍费）。金额按机型（SKU）固定费率列决定，不在此配置；此处仅冷静期。
asset:
  rebate:
    cooldown-hours: ${ASSET_REBATE_COOLDOWN_HOURS:24}
  # 购机冷静期无理由退款窗口（小时），合同约定 24h；窗口 = order.paidAt + cooldown-hours
  refund:
    cooldown-hours: ${ASSET_REFUND_COOLDOWN_HOURS:24}

springdoc:
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%c","msg":"%m","ex":"%ex"}%n'
