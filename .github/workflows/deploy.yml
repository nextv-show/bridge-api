            #WXPAY_MCH_ID=
            #WXPAY_MCH_SERIAL=
            #WXPAY_API_KEY_PATH=/opt/bridge-asset-service/wxpay/apiclient_key.pem
            #WXPAY_API_V3_KEY=
            #WX_MP_APP_ID=
            WXPAY_NOTIFY_URL=https://api.sanshuiyuan.com/api/asset/wxpay/callback
            WXPAY_WALLET_NOTIFY_URL=https://api.sanshuiyuan.com/api/asset/wxpay/wallet-callback
            ENVEOF
            fi
            # 共享密钥 upsert（JWT_SECRET 须与 bridge-user-service 同值，不一致→asset 全量 401；S2S_TOKEN 全链路同值）：repo secret 已设→每次部署写入(现网亦对齐)；未设→保留已有值、缺失才补同组占位。见 deploy/SECRETS.md
            upsert_secret() {
              local k="$1" v="$2" ph="$3" f="$4"
              if [ -z "$v" ]; then
                if sudo grep -q "^${k}=" "$f" 2>/dev/null; then return 0; fi
                v="$ph"
              fi
              sudo sed -i "/^${k}=/d" "$f"
              printf '%s=%s\n' "$k" "$v" | sudo tee -a "$f" > /dev/null
            }
            upsert_secret JWT_SECRET "${SHARED_JWT_SECRET:-}" "change-me-in-production-at-least-256-bits-long!!" "$ENV_FILE"
