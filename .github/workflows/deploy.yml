name: CD

on:
  push:
    branches: [main, 001-user-asset] # 在主开发分支上触发部署
  workflow_dispatch:

concurrency:
  group: cd-h5-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # 使用 Gradle 官方 action 自动处理缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Services (skip tests, CI has executed)
        run: ./gradlew :h5-service:assemble :admin-service:assemble :user-service:assemble :asset-service:assemble -x test

      - name: Stage jars with stable names
        run: |
          mkdir -p staging
          find h5-service/build/libs/ -name "h5-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/h5-service.jar \;
          find admin-service/build/libs/ -name "admin-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/admin-service.jar \;
          find user-service/build/libs/ -name "user-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/user-service.jar \;
          find asset-service/build/libs/ -name "asset-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/asset-service.jar \;

      - name: SCP jars to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "staging/h5-service.jar,staging/admin-service.jar,staging/user-service.jar,staging/asset-service.jar"
          target: "/tmp/"

      - name: Activate & Restart bridge-h5-service (Port 8083)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-h5-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/h5-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-h5-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # 首次自动生成示例配置文件（防首次运行挂掉，运营可在服务器手动覆写）
            sudo mkdir -p "$APP_DIR" "$REL_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[deploy] Creating $ENV_FILE from skeleton"
              sudo tee "$ENV_FILE" > /dev/null <<'ENVEOF'
            SERVER_PORT=8083
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/h5_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            DB_USERNAME=root
            DB_PASSWORD=Sanshuiyuan2026!
            REDIS_HOST=localhost
            REDIS_PORT=6379
            H5_AES_MASTER_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
            WXPAY_APP_ID=stub
            WXPAY_MCH_ID=stub
            WXPAY_API_V3_KEY=stub
            ENVEOF
            fi

            # 首次初始化 Systemd 配置文件
            SERVICE_FILE="/etc/systemd/system/${SERVICE}.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 H5 C-end Service (8083)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 60s)"
            ok=0
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8083/actuator/health || echo "000")
              if [ "$status" = "200" ]; then
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              fi
              exit 1
            fi

            echo "[deploy] success: $SERVICE running and UP"

      - name: Activate & Restart bridge-admin-service (Port 8084)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-admin-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/admin-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-admin-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # Flyway schema history 已于 2026-05-22 手动清理，后续由 Flyway 自动管理

            # 首次自动生成示例配置文件
            sudo mkdir -p "$APP_DIR" "$REL_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[deploy] Creating $ENV_FILE from skeleton"
              sudo tee "$ENV_FILE" > /dev/null <<'ENVEOF'
            SERVER_PORT=8084
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/h5_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            DB_USERNAME=root
            DB_PASSWORD=Sanshuiyuan2026!
            ADMIN_JWT_SECRET=sanshuiyuan-admin-jwt-prod-key-2026-please-change-in-production
            ENVEOF
            fi

            # 首次初始化 Systemd 配置文件
            SERVICE_FILE="/etc/systemd/system/${SERVICE}.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 H5 Admin Service (8084)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 60s)"
            ok=0
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8084/actuator/health || echo "200") # admin-service 没有 actuator 默认放行 200
              if [ "$status" = "200" ] || [ "$status" = "401" ] || [ "$status" = "404" ]; then # 401 鉴权或 404 表明服务已通
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              fi
              exit 1
            fi

            echo "[deploy] success: $SERVICE running and UP"

      - name: Activate & Restart bridge-user-service (Port 8081)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-user-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/user-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-user-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # 首次自动生成示例配置文件（运营需在服务器手动覆写真实值）
            sudo mkdir -p "$APP_DIR" "$REL_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[deploy] Creating $ENV_FILE from skeleton"
              sudo tee "$ENV_FILE" > /dev/null <<'ENVEOF'
            SERVER_PORT=8081
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            DB_USERNAME=root
            DB_PASSWORD=Sanshuiyuan2026!
            REDIS_HOST=localhost
            REDIS_PORT=6379
            JWT_SECRET=change-me-in-production-at-least-256-bits-long!!
            S2S_TOKEN=change-me-s2s-shared-token
            WX_MP_APP_ID=stub
            WX_MP_APP_SECRET=stub
            ENVEOF
            fi

            SERVICE_FILE="/etc/systemd/system/${SERVICE}.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 User Service (8081)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 60s)"
            ok=0
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/actuator/health || echo "000")
              if [ "$status" = "200" ]; then
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              fi
              exit 1
            fi

            echo "[deploy] success: $SERVICE running and UP"

      - name: Activate & Restart bridge-asset-service (Port 8082)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-asset-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/asset-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-asset-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # 首次自动生成示例配置文件（运营需覆写真实商户凭证；S2S_TOKEN 须与 user-service 一致）
            sudo mkdir -p "$APP_DIR" "$REL_DIR" "$APP_DIR/wxpay"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[deploy] Creating $ENV_FILE from skeleton"
              sudo tee "$ENV_FILE" > /dev/null <<'ENVEOF'
            SERVER_PORT=8082
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/asset_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            DB_USERNAME=root
            DB_PASSWORD=Sanshuiyuan2026!
            REDIS_HOST=localhost
            REDIS_PORT=6379
            S2S_TOKEN=change-me-s2s-shared-token
            # 微信支付默认不配置：asset-service 回退 stub 下单 + 失败关闭验签，可正常启动。
            # 启用时取消注释并填真实值，并把商户私钥放到 WXPAY_API_KEY_PATH 指向的文件。
            # ⚠️ 一旦设置 WXPAY_API_V3_KEY，设备支付验签器会立即加载私钥 PEM，缺文件会导致启动失败。
            #WXPAY_APP_ID=
            #WXPAY_MCH_ID=
            #WXPAY_MCH_SERIAL=
            #WXPAY_API_KEY_PATH=/opt/bridge-asset-service/wxpay/apiclient_key.pem
            #WXPAY_API_V3_KEY=
            #WX_MP_APP_ID=
            WXPAY_NOTIFY_URL=https://api.sanshuiyuan.com/api/asset/wxpay/callback
            WXPAY_WALLET_NOTIFY_URL=https://api.sanshuiyuan.com/api/asset/wxpay/wallet-callback
            ENVEOF
            fi

            SERVICE_FILE="/etc/systemd/system/${SERVICE}.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 Asset Service (8082)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 60s)"
            ok=0
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8082/actuator/health || echo "000")
              if [ "$status" = "200" ]; then
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              fi
              exit 1
            fi

            # 清理临时 staging 目录（最后一个部署步骤）
            rm -rf /tmp/staging

            echo "[deploy] success: $SERVICE running and UP"
