name: CD

on:
  push:
    branches: [main, 001-user-asset] # 在主开发分支上触发部署
  workflow_dispatch:

concurrency:
  group: cd-h5-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # 共享密钥单一来源：在仓库 Settings → Secrets and variables → Actions 配置后，CD 首次 provision
    # 时注入各服务 app.env（同组逐字节一致）。未配置则各步骤回退占位（与改前行为一致，不退化）。
    # 仅在 app.env 不存在时写入 → 不影响已部署/已轮换的现网。清单见 deploy/SECRETS.md。
    env:
      SHARED_JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SHARED_H5_JWT_SECRET: ${{ secrets.H5_JWT_SECRET }}
      SHARED_S2S_TOKEN: ${{ secrets.S2S_TOKEN }}
      SHARED_ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # 使用 Gradle 官方 action 自动处理缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Services (skip tests, CI has executed)
        run: ./gradlew :cend-service:assemble :admin-service:assemble :user-service:assemble :asset-service:assemble :matching-service:assemble :logistics-service:assemble :ess-service:assemble :settlement-service:assemble :iot-gateway-service:assemble :water-service:assemble :evidence-worker:assemble -x test

      - name: Stage jars with stable names
        run: |
          mkdir -p staging
          find cend-service/build/libs/ -name "cend-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/cend-service.jar \;
          find admin-service/build/libs/ -name "admin-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/admin-service.jar \;
          find user-service/build/libs/ -name "user-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/user-service.jar \;
          find asset-service/build/libs/ -name "asset-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/asset-service.jar \;
          find matching-service/build/libs/ -name "matching-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/matching-service.jar \;
          find logistics-service/build/libs/ -name "logistics-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/logistics-service.jar \;
          find ess-service/build/libs/ -name "ess-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/ess-service.jar \;
          find settlement-service/build/libs/ -name "settlement-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/settlement-service.jar \;
          find iot-gateway-service/build/libs/ -name "iot-gateway-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/iot-gateway-service.jar \;
          find water-service/build/libs/ -name "water-service-*.jar" ! -name "*-plain.jar" -exec cp {} staging/water-service.jar \;
          find evidence-worker/build/libs/ -name "evidence-worker-*.jar" ! -name "*-plain.jar" -exec cp {} staging/evidence-worker.jar \;

      - name: SCP jars to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "staging/cend-service.jar,staging/admin-service.jar,staging/user-service.jar,staging/asset-service.jar,staging/matching-service.jar,staging/logistics-service.jar,staging/ess-service.jar,staging/settlement-service.jar,staging/iot-gateway-service.jar,staging/water-service.jar,staging/evidence-worker.jar"
          target: "/tmp/"

      # NOTE: admin-service 先于 cend-service 部署 —— admin 的 Flyway 迁移（如 V078 给
      # orders 加 h5_order_no 列）必须先生效，cend-service 的 AdminOrderProjector 才能写该列。
      - name: Activate & Restart bridge-admin-service (Port 8084)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          envs: SHARED_JWT_SECRET,SHARED_H5_JWT_SECRET,SHARED_S2S_TOKEN,SHARED_ADMIN_JWT_SECRET
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-admin-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/admin-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-admin-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # Flyway schema history 已于 2026-05-22 手动清理，后续由 Flyway 自动管理

            # 首次自动生成示例配置文件
            sudo mkdir -p "$APP_DIR" "$REL_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[deploy] Creating $ENV_FILE from skeleton"
              sudo tee "$ENV_FILE" > /dev/null <<'ENVEOF'
            SERVER_PORT=8084
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            DB_USERNAME=root
            DB_PASSWORD=Sanshuiyuan2026!
            ENVEOF
            fi
            # 共享密钥 upsert（ADMIN_JWT_SECRET 仅 admin；S2S_TOKEN 全链路同值）：repo secret 已设→每次部署写入(现网亦对齐)；未设→保留已有值、缺失才补占位。见 deploy/SECRETS.md
            upsert_secret() {
              local k="$1" v="$2" ph="$3" f="$4"
              if [ -z "$v" ]; then
                if sudo grep -q "^${k}=" "$f" 2>/dev/null; then return 0; fi
                v="$ph"
              fi
              sudo sed -i "/^${k}=/d" "$f"
              printf '%s=%s\n' "$k" "$v" | sudo tee -a "$f" > /dev/null
            }
            upsert_secret ADMIN_JWT_SECRET "${SHARED_ADMIN_JWT_SECRET:-}" "sanshuiyuan-admin-jwt-prod-key-2026-please-change-in-production" "$ENV_FILE"
            upsert_secret S2S_TOKEN "${SHARED_S2S_TOKEN:-}" "local-dev-static-token" "$ENV_FILE"

            # 首次初始化 Systemd 配置文件
            SERVICE_FILE="/etc/systemd/system/${SERVICE}.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 H5 Admin Service (8084)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 60s)"
            ok=0
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8084/actuator/health || echo "000")
              if [ "$status" = "200" ] || [ "$status" = "401" ] || [ "$status" = "404" ]; then # 401 鉴权或 404 表明服务已通
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              fi
              exit 1
            fi

            # 保留最近 6 个构建（含当前 active），清理其余历史 jar 释放磁盘
            ACTIVE_JAR="$(readlink -f "$APP_DIR/app.jar" 2>/dev/null || true)"
            (ls -1t "$REL_DIR"/*.jar 2>/dev/null || true) | tail -n +7 | while read -r OLD_JAR; do
              if [ "$OLD_JAR" != "$ACTIVE_JAR" ]; then sudo rm -f "$OLD_JAR"; fi
            done || true

            echo "[deploy] success: $SERVICE running and UP"

      - name: Activate & Restart bridge-cend-service (Port 8083)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          envs: SHARED_JWT_SECRET,SHARED_H5_JWT_SECRET,SHARED_S2S_TOKEN,SHARED_ADMIN_JWT_SECRET
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-cend-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/cend-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-cend-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # 一次性迁移：bridge-h5-service → bridge-cend-service
            OLD_SERVICE="bridge-h5-service"
            OLD_DIR="/opt/bridge-h5-service"
            if systemctl is-active --quiet "$OLD_SERVICE" 2>/dev/null; then
              echo "[migrate] stopping old service $OLD_SERVICE"
              sudo systemctl stop "$OLD_SERVICE"
              sudo systemctl disable "$OLD_SERVICE"
            fi
            if [ -d "$OLD_DIR" ] && [ ! -d "$APP_DIR" ]; then
              echo "[migrate] renaming $OLD_DIR → $APP_DIR"
              sudo mv "$OLD_DIR" "$APP_DIR"
              if [ -f "/etc/systemd/system/$OLD_SERVICE.service" ]; then
                sudo rm "/etc/systemd/system/$OLD_SERVICE.service"
                sudo systemctl daemon-reload
              fi
            fi

            # 首次自动生成示例配置文件（防首次运行挂掉，运营可在服务器手动覆写）
            sudo mkdir -p "$APP_DIR" "$REL_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[deploy] Creating $ENV_FILE from skeleton"
              sudo tee "$ENV_FILE" > /dev/null <<'ENVEOF'
            SERVER_PORT=8083
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            DB_USERNAME=root
            DB_PASSWORD=Sanshuiyuan2026!
            REDIS_HOST=localhost
            REDIS_PORT=6379
            H5_AES_MASTER_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
            WXPAY_APP_ID=stub
            WXPAY_MCH_ID=stub
            WXPAY_API_V3_KEY=stub
            ENVEOF
            fi
            # 共享密钥 upsert（cend 是 H5_JWT_SECRET 签发方；S2S_TOKEN 全链路同值）：repo secret 已设→每次部署写入(现网亦对齐)；未设→保留已有值、缺失才补占位。见 deploy/SECRETS.md
            upsert_secret() {
              local k="$1" v="$2" ph="$3" f="$4"
              if [ -z "$v" ]; then
                if sudo grep -q "^${k}=" "$f" 2>/dev/null; then return 0; fi
                v="$ph"
              fi
              sudo sed -i "/^${k}=/d" "$f"
              printf '%s=%s\n' "$k" "$v" | sudo tee -a "$f" > /dev/null
            }
            upsert_secret H5_JWT_SECRET "${SHARED_H5_JWT_SECRET:-}" "dev-h5-jwt-secret-please-override-in-prod-0001" "$ENV_FILE"
            upsert_secret S2S_TOKEN "${SHARED_S2S_TOKEN:-}" "local-dev-static-token" "$ENV_FILE"

            # 首次初始化 Systemd 配置文件
            SERVICE_FILE="/etc/systemd/system/${SERVICE}.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 H5 C-end Service (8083)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 60s)"
            ok=0
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8083/actuator/health || echo "000")
              if [ "$status" = "200" ]; then
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              fi
              exit 1
            fi

            # 保留最近 6 个构建（含当前 active），清理其余历史 jar 释放磁盘
            ACTIVE_JAR="$(readlink -f "$APP_DIR/app.jar" 2>/dev/null || true)"
            (ls -1t "$REL_DIR"/*.jar 2>/dev/null || true) | tail -n +7 | while read -r OLD_JAR; do
              if [ "$OLD_JAR" != "$ACTIVE_JAR" ]; then sudo rm -f "$OLD_JAR"; fi
            done || true

            echo "[deploy] success: $SERVICE running and UP"

      - name: Activate & Restart bridge-user-service (Port 8081)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          envs: SHARED_JWT_SECRET,SHARED_H5_JWT_SECRET,SHARED_S2S_TOKEN,SHARED_ADMIN_JWT_SECRET
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-user-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/user-service.jar"
            ENV_FILE="$APP_DIR/app.env"
