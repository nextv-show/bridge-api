              echo "[deploy] Bootstrapping systemd service: $SERVICE"
              sudo tee "$SERVICE_FILE" > /dev/null <<SYSEOF
            [Unit]
            Description=三水元 ESS Contract Service (8085)
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=$APP_DIR
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/java -jar $APP_DIR/app.jar
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SYSEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE"
            fi

            if [ ! -f "$INCOMING" ]; then
              echo "[deploy] FATAL: jar not found at $INCOMING" >&2
              exit 1
            fi

            PREV_JAR=""
            if [ -L "$APP_DIR/app.jar" ]; then
              PREV_JAR="$(readlink "$APP_DIR/app.jar" || true)"
            fi

            sudo mv -f "$INCOMING" "$REL_DIR/$NEW_JAR"
            sudo ln -sfn "$REL_DIR/$NEW_JAR" "$APP_DIR/app.jar"

            echo "[deploy] restarting service: $SERVICE"
            sudo systemctl restart "$SERVICE"

            echo "[deploy] wait health check (max 90s — 首次冷启含 Flyway)"
            ok=0
            i=0
            while [ "$i" -lt 45 ]; do
              i=$((i + 1))
              sleep 2
              status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8085/actuator/health || echo "000")
              if [ "$status" = "200" ]; then
                ok=1
                break
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "[deploy] health check failed, rollback!" >&2
              sudo journalctl -u "$SERVICE" -n 80 --no-pager || true
              if [ -n "$PREV_JAR" ] && [ -f "$PREV_JAR" ]; then
                sudo ln -sfn "$PREV_JAR" "$APP_DIR/app.jar"
                sudo systemctl restart "$SERVICE"
              else
                echo "[deploy] 无既往 systemd jar 可回滚；如需应急可 cd /opt/ess-service && mv docker-compose.yml.disabled docker-compose.yml && docker compose up -d" >&2
              fi
              exit 1
            fi

            # 清理临时 staging 目录（最后一个部署步骤）
            rm -rf /tmp/staging

            # 保留最近 6 个构建（含当前 active），清理其余历史 jar 释放磁盘
