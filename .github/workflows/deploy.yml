      - name: Activate & Restart bridge-ess-service (Port 8085)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          envs: SHARED_JWT_SECRET,SHARED_H5_JWT_SECRET,SHARED_S2S_TOKEN,SHARED_ADMIN_JWT_SECRET
          script: |
            set -euo pipefail

            APP_DIR="/opt/bridge-ess-service"
            REL_DIR="$APP_DIR/releases"
            INCOMING="/tmp/staging/ess-service.jar"
            ENV_FILE="$APP_DIR/app.env"
            SERVICE="bridge-ess-service"
            NEW_JAR="app-${{ github.sha }}.jar"

            # 一次性迁移：Docker 容器 ess-service → 宿主机 systemd（释放 127.0.0.1:8085）
            if sudo docker ps -a --format '{{.Names}}' 2>/dev/null | grep -qx "ess-service"; then
              echo "[migrate] stopping & removing docker ess-service (compose down to disable restart=always)"
              if [ -f /opt/ess-service/docker-compose.yml ]; then
                (cd /opt/ess-service && sudo docker compose down) || sudo docker rm -f ess-service
                sudo mv /opt/ess-service/docker-compose.yml /opt/ess-service/docker-compose.yml.disabled || true
              else
                sudo docker rm -f ess-service
              fi
            fi

