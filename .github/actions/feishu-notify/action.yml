name: '飞书部署通知'
description: '向飞书群发送部署状态卡片通知（开始/成功/失败）'
inputs:
  stage:
    description: '通知阶段: start | success | failure'
    required: true
  project-name:
    description: '项目/服务显示名称（如「三水元后端」）'
    required: true
  webhook-url:
    description: '飞书自定义机器人 Webhook URL'
    required: true

runs:
  using: 'composite'
  steps:
    - name: 通知飞书群
      shell: bash
      env:
        STAGE: ${{ inputs.stage }}
        PROJECT_NAME: ${{ inputs.project-name }}
        WEBHOOK_URL: ${{ inputs.webhook-url }}
      run: |
        set +e
        BRANCH="${GITHUB_REF_NAME}"
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null | head -1)
        AUTHOR=$(git log -1 --pretty=%an 2>/dev/null)

        case "$STAGE" in
          start)
            TITLE="🚀 部署开始 - $PROJECT_NAME"
            COLOR="blue"
            BODY=$(printf '**提交**: %s\n**作者**: %s\n**分支**: %s' "$COMMIT_MSG" "$AUTHOR" "$BRANCH")
            ;;
          success)
            TITLE="✅ 部署成功 - $PROJECT_NAME"
            COLOR="green"
            BODY=$(printf '**分支**: %s\n**运行 ID**: %s\n\n部署已完成，可进行测试验证。' "$BRANCH" "${GITHUB_RUN_ID}")
            ;;
          failure)
            TITLE="❌ 部署失败 - $PROJECT_NAME"
            COLOR="red"
            BODY=$(printf '**提交**: %s\n**分支**: %s\n**运行 ID**: %s\n\n请检查 Actions 日志排查失败原因。' "$COMMIT_MSG" "$BRANCH" "${GITHUB_RUN_ID}")
            ;;
        esac

        # 用 jq 构造 payload：title/body/url 经 --arg 安全转义，commit message 含 " \ 换行等不再破坏 JSON。
        # BODY 用 printf 含真实换行，jq 编码为 JSON \n，保留卡片换行（原直插 \n 已是 JSON 转义，行为一致）。
        PAYLOAD=$(jq -nc \
          --arg title "$TITLE" \
          --arg color "$COLOR" \
          --arg body "$BODY" \
          --arg url "$RUN_URL" \
          '{msg_type:"interactive",card:{header:{title:{tag:"plain_text",content:$title},template:$color},elements:[{tag:"div",text:{tag:"lark_md",content:$body}},{tag:"action",actions:[{tag:"button",text:{tag:"plain_text",content:"查看运行"},url:$url,type:"primary"}]}]}}')

        curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD"
        echo ""
