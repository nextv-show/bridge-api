server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  access-token-ttl: 2h
  refresh-token-ttl: 14d
  secret: ${JWT_SECRET:change-me-in-production-at-least-256-bits-long!!}

# service-to-service token：必须与 asset-service 的 user-service.s2s-token 一致
s2s-token: ${S2S_TOKEN:local-dev-static-token}

wx:
  miniprogram:
    app-id: ${WX_MP_APP_ID:}
    app-secret: ${WX_MP_APP_SECRET:}
  open-platform:
    app-id: ${WX_OP_APP_ID:}
    app-secret: ${WX_OP_APP_SECRET:}

rate-limit:
  login:
    max-requests: 60
    per-minutes: 1

springdoc:
  api-docs:
    path: /api-docs

# 日志格式与 unionid/openid 脱敏由 logback-spring.xml 统一接管（A.1.3）
