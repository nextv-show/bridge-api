server:
  port: 8081

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  access-token-ttl: 2h
  refresh-token-ttl: 14d
  secret: ${JWT_SECRET:change-me-in-production-at-least-256-bits-long!!}

# service-to-service token：必须与 asset-service 的 user-service.s2s-token 一致
s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 出站调用 asset-service 内部接口（购机订单在 asset-service 独立库）。
# s2s-token 与 asset-service 入站期望 s2s-token 共享同一 S2S_TOKEN 环境变量 / 默认值。
asset-service:
  base-url: http://localhost:8082
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 推广关系链（ref_id HMAC 签名密钥 + 分享链接基址）
user:
  referral:
    # 生产务必用环境变量 USER_REFERRAL_REF_ID_SECRET 覆盖此默认值（默认值仅用于本地/测试）
    ref-id-secret: ${USER_REFERRAL_REF_ID_SECRET:please-override-in-prod-please-override-in-prod}
    # 分享链接基址；小程序分享无需 url，留空即可（shareUrl 退化为相对路径）
    link-base: ${USER_REFERRAL_LINK_BASE:}

wx:
  miniprogram:
    app-id: ${WX_MP_APP_ID:}
    app-secret: ${WX_MP_APP_SECRET:}
  open-platform:
    app-id: ${WX_OP_APP_ID:}
    app-secret: ${WX_OP_APP_SECRET:}

rate-limit:
  login:
    max-requests: 60
    per-minutes: 1

springdoc:
  api-docs:
    path: /api-docs

# 日志格式与 unionid/openid 脱敏由 logback-spring.xml 统一接管（A.1.3）
