server:
  port: 8084

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:mysql://localhost:3306/asset_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    table: admin_flyway_schema_history

admin:
  jwt-secret: ${ADMIN_JWT_SECRET:dev-admin-secret-key-change-in-prod}
  jwt-ttl-hours: 8
  # 用户花名册对账：周期从 user-service 拉取真实注册用户 upsert 到 admin users 表（UserSyncScheduler）。
  user-sync:
    enabled: ${ADMIN_USER_SYNC_ENABLED:true}
    interval-ms: ${ADMIN_USER_SYNC_INTERVAL_MS:600000}      # 默认 10min
    initial-delay-ms: ${ADMIN_USER_SYNC_INITIAL_DELAY_MS:60000}  # 启动后延迟 60s 首跑

user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 合同管理 BFF：admin-service 透传到 ess-service /api/admin/contracts/*（携带 X-S2S-Token）。
ess-service:
  base-url: ${ESS_SERVICE_BASE_URL:http://localhost:8085}
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

springdoc:
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%c","msg":"%m","ex":"%ex"}%n'
