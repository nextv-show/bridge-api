server:
  port: 8084

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:mysql://localhost:3306/asset_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: admin_flyway_schema_history

admin:
  jwt-secret: ${ADMIN_JWT_SECRET:dev-admin-secret-key-change-in-prod}
  jwt-ttl-hours: 8

springdoc:
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%c","msg":"%m","ex":"%ex"}%n'
