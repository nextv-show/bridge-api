server:
  port: 8083

spring:
  application:
    name: h5-service
  datasource:
    # 本地 docker-compose.dev.yml 把 MySQL 映射到 3307，用 SPRING_DATASOURCE_URL 覆盖即可。
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/h5_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms

# Redis 为 L2 缓存（读多写少，缺失时优雅降级到 DB），避免缺 Redis 时 actuator health DOWN。
management:
  health:
    redis:
      enabled: false

# 落地页配置缓存（plan §6）：L1 Caffeine TTL 60s / L2 Redis TTL 300s。
landing:
  cache:
    caffeine-ttl-seconds: 60
    caffeine-max-size: 4
    redis-ttl-seconds: 300
    redis-key: 'landing:config:published'

# 公开接口限频（bucket4j）：同 IP 120 次/分钟。
rate-limit:
  landing:
    max-requests: 120
    per-minutes: 1

springdoc:
  api-docs:
    path: /api-docs

# Spec 012: H5 登录成功后调 user-service /internal/users/sync-h5 并入统一用户体系。
# s2s-token 必须与 user-service 的 s2s-token 一致。
user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
  s2s-token: ${S2S_TOKEN:local-dev-static-token}

# 103: 设备购置 + 支付 + 实名
h5:
  aes-master-key: ${H5_AES_MASTER_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  # H5 会话 JWT（与 admin JWT 独立）。HS256 需 >=32 字节密钥；生产务必用环境变量覆盖。
  jwt-secret: ${H5_JWT_SECRET:dev-h5-jwt-secret-please-override-in-prod-0001}
  jwt-ttl-hours: ${H5_JWT_TTL_HOURS:72}
  # H5 公网 HTTPS 根地址，用于拼接实名认证回跳 ReturnUrl（如 https://h5.example.com）。
  public-base-url: ${H5_PUBLIC_BASE_URL:http://localhost:5173}
  referral:
    # ref_id HMAC-SHA256 签名密钥（防篡改、不可猜测他人 user_id）。生产务必用环境变量覆盖。
    ref-id-secret: ${H5_REFERRAL_REF_ID_SECRET:dev-h5-referral-secret-please-override-in-prod-0001}
  # 011 冷静期返利冻结：金额为占位值（分账算法待运营确认），冷静期与订单退款一致（24h）。
  rebate:
    l1-amount-cents: ${H5_REBATE_L1_AMOUNT_CENTS:0}   # L1 直接邀请人返利占位金额（分）
    l2-amount-cents: ${H5_REBATE_L2_AMOUNT_CENTS:0}   # L2 间接邀请人返利占位金额（分）
    cooldown-hours: ${H5_REBATE_COOLDOWN_HOURS:24}    # FROZEN 满此时长解冻为 CONFIRMED
wxpay:
  app-id: ${WXPAY_APP_ID:stub}
  app-secret: ${WX_APP_SECRET:}            # 公众号 appSecret，网页授权 code→openid 用
  mch-id: ${WXPAY_MCH_ID:stub}
  api-v3-key: ${WXPAY_API_V3_KEY:stub}
  private-key-path: ${WXPAY_PRIVATE_KEY_PATH:}
  merchant-serial-number: ${WXPAY_MERCHANT_SERIAL_NUMBER:}
  notify-url: ${WXPAY_NOTIFY_URL:}         # 支付结果异步通知公网地址，如 https://api.example.com/api/h5/pay/callback
  refund-notify-url: ${WXPAY_REFUND_NOTIFY_URL:}  # 退款结果异步通知公网地址
  public-key-path: ${WXPAY_PUBLIC_KEY_PATH:}       # 微信支付公钥文件路径（新商户公钥模式必填）
  public-key-id: ${WXPAY_PUBLIC_KEY_ID:}           # 微信支付公钥 ID，如 PUB_KEY_ID_xxxxxxxxxx
# Spec 106: 微信模板消息推送（服务号认证后在服务号后台申请，填入 templateId）
wx:
  tpl:
    pay-success: ${WX_TPL_PAY_SUCCESS:}       # 支付成功通知模板 ID，空则降级不推送
    refund-success: ${WX_TPL_REFUND_SUCCESS:} # 退款成功通知模板 ID，空则降级不推送
  subscribe:
    cache-ttl-seconds: 3600                   # 用户关注状态 Redis 缓存时长（1h）
  # Spec 009: 微信 JS-SDK 分享卡片文案（后端下发，前端不硬编码）。合规铁律：严禁金融化话术。
  share:
    title: ${WX_SHARE_TITLE:三水元 · AI 健康饮水}
    desc: ${WX_SHARE_DESC:开启 AI 健康饮水档案}
    img-url: ${WX_SHARE_IMG_URL:}             # 分享缩略图绝对 URL，空则前端兜底品牌 logo

aliyun:
  kyc:
    access-key: ${ALIYUN_KYC_ACCESS_KEY:}
    secret-key: ${ALIYUN_KYC_SECRET_KEY:}
    scene-id: ${ALIYUN_KYC_SCENE_ID:1000018706}        # 三水元 H5 场景实人认证
    endpoint: ${ALIYUN_KYC_ENDPOINT:cloudauth.aliyuncs.com}  # 全局接入地址
    product-code: ${ALIYUN_KYC_PRODUCT_CODE:LR_FR}     # 活体检测方案（唯一取值 LR_FR）
    model: ${ALIYUN_KYC_MODEL:MOVE_ACTION}             # 活体类型：远近移动+眨眼（推荐）

---
# ───────────────── dev（本地开发） ─────────────────
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    com.sanshuiyuan.h5: DEBUG

---
# ───────────────── staging（预发） ─────────────────
spring:
  config:
    activate:
      on-profile: staging

---
# ───────────────── prod（生产） ─────────────────
# 生产敏感项（DB/Redis 凭证）一律走环境变量，绝不入 git。
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
